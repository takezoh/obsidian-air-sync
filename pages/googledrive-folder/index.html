<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline' https://apis.google.com; style-src 'unsafe-inline' https://www.gstatic.com https://ssl.gstatic.com; connect-src https://content.googleapis.com https://www.googleapis.com https://picker.googleapis.com; img-src https://*.googleusercontent.com https://*.gstatic.com https://ssl.gstatic.com data:; frame-src https://docs.google.com https://picker.googleapis.com https://content.googleapis.com;"
    />
    <!--
      Google Picker host for Air Sync. The plugin opens this page in the browser
      (it can't load the remote Picker SDK inside Obsidian), the user picks a
      folder, and we bounce the result to obsidian://air-sync-folder — like
      ../callback/, but on its own scheme (folder pick is not an auth flow).

      Unlike the Dropbox Chooser, the Google Picker needs an OAuth access token to
      render the user's Drive. The plugin passes its current drive.file token in the
      URL FRAGMENT (#token=…) — the fragment is never sent to this host and is
      scrubbed from history immediately on load. We never put the token in the query
      and never forward it in the obsidian:// redirect (only id/name/state go back).

      Selecting a folder via the Picker with setAppId(<project number>) is what grants
      the app (the same OAuth client whose token this is) access to that folder under
      drive.file, so the plugin can then sync into it.

      Requires, in Google Cloud Console (project 135801498656): the Google Picker API
      enabled and an API key restricted to the Picker API + the HTTP referrer
      https://airsync.takezo.dev/* (placeholder below). The page is inert until
      deployed to airsync.takezo.dev and the key is filled in.

      NOTE: the Picker's exact CSP frame-src/connect-src hosts drift across Google's
      iframe-host migrations. If the Picker renders blank, widen this allowlist
      minimally based on the browser console's CSP violations.
    -->
    <script src="https://apis.google.com/js/api.js"></script>
    <title>Air Sync - Choose Google Drive folder</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 480px;
        margin: 80px auto;
        padding: 0 20px;
        color: #333;
        text-align: center;
      }
      h1 {
        font-size: 1.4rem;
      }
      .message {
        margin: 24px 0;
        line-height: 1.6;
      }
      .hint {
        font-size: 0.9rem;
        color: #666;
        margin-bottom: 24px;
      }
      .error {
        color: #c0392b;
      }
      button {
        font-size: 1rem;
        padding: 10px 24px;
        background: #1a73e8;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background: #1765cc;
      }
    </style>
  </head>
  <body>
    <h1>Air Sync for Obsidian</h1>
    <p class="hint">
      Choose the Google Drive folder to sync into. Air Sync gets access only to the
      folder you pick here.
    </p>
    <div id="content">
      <button id="choose" type="button">Choose folder in Google Drive</button>
    </div>

    <script>
      (function () {
        // ── Cloud Console placeholders ─────────────────────────────────────────
        var APP_ID = "135801498656"; // project number of the built-in OAuth client
        // Picker API key — safe to ship in client HTML ONLY because it is restricted in
        // Google Cloud Console to the Picker API + the HTTP referrer airsync.takezo.dev/*.
        var API_KEY = "AIzaSyDyXTKejmlaTcBIDCx3lJYFhDMmyRKRZwc";

        var REDIRECT_BASE = "obsidian://air-sync-folder";
        var params = new URLSearchParams(window.location.search);
        var state = params.get("state") || "";

        // Read the access token from the fragment, then scrub it from the URL/history
        // immediately — before anything else runs — so it doesn't linger in history.
        var hashParams = new URLSearchParams((window.location.hash || "").replace(/^#/, ""));
        var token = hashParams.get("token") || "";
        try {
          history.replaceState(null, "", window.location.pathname + window.location.search);
        } catch (e) {
          window.location.hash = "";
        }

        var content = document.getElementById("content");

        // Static (no dynamic data) messages only — safe as innerHTML.
        function showMessage(text, isError) {
          content.innerHTML =
            '<p class="message' + (isError ? " error" : "") + '"></p>';
          content.firstChild.textContent = text;
        }

        // A button + handler built via DOM, never string-concatenated HTML, so the
        // (attacker-influenceable) redirect URL never enters an HTML/attribute
        // parsing context. encodeURIComponent does NOT escape ' / ( ), so building
        // an onclick="…'+url+'…" attribute would be XSS-able via a folder name or
        // the state query param.
        function showButton(label, onClick) {
          content.replaceChildren();
          var btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = label;
          btn.addEventListener("click", onClick);
          content.appendChild(btn);
        }

        function redirectToObsidian(id, name) {
          var redirect =
            REDIRECT_BASE +
            "?id=" + encodeURIComponent(id) +
            "&name=" + encodeURIComponent(name || "") +
            "&state=" + encodeURIComponent(state);
          showButton("Open Obsidian", function () {
            window.location.href = redirect;
          });
          window.location.href = redirect;
        }

        var pickerLoaded = false;
        if (window.gapi && gapi.load) {
          gapi.load("picker", function () {
            pickerLoaded = true;
          });
        }

        function pickerCallback(data) {
          var action = data[google.picker.Response.ACTION];
          if (action === google.picker.Action.PICKED) {
            var doc = data[google.picker.Response.DOCUMENTS][0];
            if (!doc) {
              showMessage("No folder was selected.", true);
              return;
            }
            redirectToObsidian(
              doc[google.picker.Document.ID],
              doc[google.picker.Document.NAME]
            );
          } else if (action === google.picker.Action.CANCELLED) {
            showButton("Choose folder in Google Drive", openPicker);
          }
        }

        function openPicker() {
          if (!token) {
            showMessage(
              "Couldn't read the Google Drive access token. Reopen the picker from Obsidian settings.",
              true
            );
            return;
          }
          if (!pickerLoaded || !window.google || !google.picker) {
            showMessage("Google Picker failed to load. Please try again.", true);
            return;
          }
          // ViewId.DOCS + setIncludeFolders shows the My Drive hierarchy so the
          // user can drill into subfolders. ViewId.FOLDERS (used before) renders a
          // FLAT list of every folder in the drive instead of a navigable tree.
          var view = new google.picker.DocsView(google.picker.ViewId.DOCS)
            .setParent("root")
            .setIncludeFolders(true)
            .setSelectFolderEnabled(true)
            .setMimeTypes("application/vnd.google-apps.folder")
            .setMode(google.picker.DocsViewMode.LIST);
          var picker = new google.picker.PickerBuilder()
            .setAppId(APP_ID)
            .setOAuthToken(token)
            .setDeveloperKey(API_KEY)
            .addView(view)
            .setTitle("Choose the folder to sync")
            .setCallback(pickerCallback)
            .build();
          picker.setVisible(true);
        }

        document.getElementById("choose").addEventListener("click", openPicker);
      })();
    </script>
  </body>
</html>
